name: Figma Token Sync

# Triggered when Tokens Studio pushes token changes via GitHub integration
on:
  push:
    branches:
      - 'tokens-studio/**'  # Tokens Studio creates branches with this prefix
    paths:
      - 'packages/*/tokens/**'

jobs:
  build-and-pr:
    name: Build tokens and create PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Validate tokens
        run: node scripts/validate-tokens.js

      - name: Commit build outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/dist/
          if git diff --cached --quiet; then
            echo "No build output changes"
          else
            git commit -m "chore: rebuild token outputs from Figma sync"
            git push
          fi

      - name: Create PR to main
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `design: Figma token sync — ${branch}`,
                head: branch,
                base: 'main',
                body: [
                  '## Figma Token Sync',
                  '',
                  'Tokens Studio pushed updated design tokens from Figma.',
                  '',
                  '### Changed packages',
                  '- Check the diff for which packages were updated',
                  '',
                  '### Review checklist',
                  '- [ ] Token values look correct',
                  '- [ ] Build outputs generated successfully',
                  '- [ ] Cross-package validation passed',
                  '',
                  '🎨 Auto-generated by Tokens Studio sync'
                ].join('\n')
              });
            }
