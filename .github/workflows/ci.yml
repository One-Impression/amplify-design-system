name: Design System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-validate:
    name: Build & Validate Tokens
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: '@amplify-ai'

      - name: Install dependencies
        run: npm ci

      - name: Build token packages
        run: |
          npm run build -w packages/tokens-foundation
          npm run build -w packages/tokens-brand
          npm run build -w packages/tokens-creator
          npm run build -w packages/tokens-atmosphere
          npm run build -w packages/tokens-marketing

      - name: Build @amplify-ai/ui
        run: npm run build -w packages/ui

      - name: Build @amplify-ai/mcp-server
        run: npm run build -w packages/mcp-server

      - name: Validate cross-package consistency
        run: node scripts/validate-tokens.js

      - name: Test design-lint rules
        run: node --test packages/design-lint/test/*.test.js

      - name: Verify build outputs
        run: |
          MISSING=""
          for pkg in tokens-foundation tokens-brand tokens-creator tokens-atmosphere tokens-marketing ui mcp-server; do
            DIR="packages/$pkg/dist"
            if [ ! -d "$DIR" ]; then
              MISSING="$MISSING\n  - packages/$pkg/dist/ (directory missing)"
              continue
            fi
            FILE_COUNT=$(ls "$DIR" 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -eq 0 ]; then
              MISSING="$MISSING\n  - packages/$pkg/dist/ (empty)"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Missing build outputs:$MISSING"
            exit 1
          fi
          echo "All packages built successfully"

      - name: Build Storybook
        run: npm run build -w packages/storybook

      - name: Publish packages
        if: github.ref == 'refs/heads/main' && env.NPM_TOKEN_SET == 'true'
        env:
          NPM_TOKEN_SET: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          set -e
          for pkg in tokens-foundation tokens-brand tokens-atmosphere tokens-creator ui mcp-server eslint-config; do
            echo "Publishing @amplify-ai/$pkg..."
            (
              cd packages/$pkg
              # Public npm — access:public via publishConfig in package.json
              OUTPUT=$(npm publish 2>&1) && echo "$OUTPUT" || {
                EXIT_CODE=$?
                echo "$OUTPUT"
                # Recognise every shape of "this version already exists" the
                # registry might return. npm CLI emits EPUBLISHCONFLICT, public
                # npm says "You cannot publish over the previously published
                # versions" — silently skipping a no-op republish lets us
                # iterate on docs/CI without bumping versions every time.
                if echo "$OUTPUT" | grep -qE 'EPUBLISHCONFLICT|already been published|You cannot publish over the previously published versions|cannot publish over the previously published'; then
                  echo "Package already published at this version — skipping"
                else
                  echo "::error::Publish failed for $pkg"
                  exit $EXIT_CODE
                fi
              }
            )
          done
        env:
          # Public npm publishing requires NPM_TOKEN secret (org-level "amplify"
          # publish access). Setup: create npm org "amplify" → generate
          # automation token with "publish" scope → add as NPM_TOKEN secret on
          # this repo. Until that's done, the step's `if:` skips publishing
          # gracefully so CI stays green on builds + tests.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish skipped (NPM_TOKEN not set)
        if: github.ref == 'refs/heads/main' && env.NPM_TOKEN_SET != 'true'
        env:
          NPM_TOKEN_SET: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          echo "::notice title=Publish skipped::NPM_TOKEN secret is not set on this repo. Build + tests passed but @amplify-ai/* was NOT published. To enable publishing: (1) create npm org 'amplify-ai' at npmjs.com/org/create, (2) generate an automation token with publish scope, (3) gh secret set NPM_TOKEN -R One-Impression/amplify-design-system. Then re-run this workflow."

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          FOUND=""
          PATTERNS='(AKIA[A-Z0-9]{16}|ghp_[A-Za-z0-9]{36}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----|sk-[A-Za-z0-9]{48})'

          while IFS= read -r file; do
            MATCHES=$(grep -nE "$PATTERNS" "$file" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND="$FOUND\n$file:\n$MATCHES\n"
            fi
          done < <(find . -type f \( -name "*.json" -o -name "*.js" -o -name "*.ts" -o -name "*.md" \) -not -path "*/node_modules/*" -not -path "*/.git/*")

          if [ -n "$FOUND" ]; then
            echo "::error::Potential secrets found:"
            printf "$FOUND"
            exit 1
          fi
          echo "No secrets found"

  sdui-sync-check:
    name: SDUI Token Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: One-Impression/api-gateway
          path: api-gateway
          token: ${{ secrets.CROSS_REPO_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check creator tokens vs api-gateway ColorType
        run: |
          if [ ! -d api-gateway ]; then
            echo "::warning::api-gateway checkout failed (missing CROSS_REPO_TOKEN secret) — skipping sync check"
            exit 0
          fi
          if [ -f packages/tokens-creator/scripts/sync-check.js ]; then
            node packages/tokens-creator/scripts/sync-check.js api-gateway/src/apigateway/mobile_ui/ui_kit/properties/color_type.py
          else
            echo "sync-check.js not found — skipping"
          fi
